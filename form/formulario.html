<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulãrio</title>
</head>

<body>
    <h1>Fomulário de usuaário</h1>
    <form action"" method="POST">
        <fieldset>
            <legend>Dados Pessoais</legend>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
            <br>
            <br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Digite seu email" required>
            <br>
            <br>
            <label for="Senha">Senha:</label>
            <input type="password" id="nome" name="nome" placeholder="Digite seu nome" minlength="6">
            <br>
            <br>
            <label for="data">Data de nascimento:</label>
            <input type="date" placeholder="Selecione a data" nome="data">
        </fieldset>
        <fieldset>
            <legend>Gênero</legend>
            <input type="radio" id="opcao1" name="opcao1" value="opcao1">Masculino
            <input type="radio" id="opcao2" name="opcao2" value="opcao2">Feminino
            <input type="radio" id="opcao3" name="opcao3" value="opcao3">Outro
        </fieldset>
        <fieldset>
            <legend>Informações adicionais</legend>
            <label for="foto">Envie uma foto sua:</label>
            <input type="file" value="lesad" id="foto" name="foto" accept="image/*">
            <br>
            <label for="cor">Sua cor favorita</label>
            <input type="color" name="cor">
            <br>
            <label for="text">Como está se sentindo hoje?</label>
            <textarea id="text" name="text" maxlength="50" name="txt"></textarea>
        </fieldset>

        <button type="reset" id="bot" >Limpar</button>
        <button type="submit" onclick="EnviarForm()">Enviar</button>
        <script>
            function EnviarForm() {
                alert('Você enviou um formulário');
            }
        </script>
    </form>
</body>

</html>
